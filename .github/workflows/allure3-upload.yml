name: upload to allure testops using allure3

on:
  workflow_dispatch:

jobs:
  all-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: install allure3
        run: |
          npm install -g allure
          npm init -y
          npm add -D allure
      - name: run java tests
        run: | 
          allure run --configfile -- ./gradlew clean test
        env:
          ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT_TESTING }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN_TESTING }}
          ALLURE_PROJECT_ID: 276
          ALLURE_RESULTS: "allure-results"
          ALLURE_LAUNCH_NAME: "GitHub Actions upload using allure3"